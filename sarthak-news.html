<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARTHAK News</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* VARIABLES */
:root{
  --ink:#0d0d0d;
  --paper:#f5f0e8;
  --accent:#c0392b;
  --muted:#6b6560;
}

/* DARK MODE */
.dark{
  --paper:#0d0d0d;
  --ink:#f5f0e8;
}

/* BODY */
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Source Sans 3',sans-serif;
}

/* TOP BAR */
.top-bar{
  background:var(--ink);
  color:#ccc;
  display:flex;
  justify-content:space-between;
  padding:6px 20px;
  font-size:12px;
}

.top-bar button{
  background:none;
  border:none;
  color:#ccc;
  cursor:pointer;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  border-bottom:2px solid var(--ink);
}

header h1{
  font-family:'Playfair Display';
  font-size:3rem;
}

header span{
  color:var(--accent);
}

/* NAV */
nav{
  background:var(--ink);
  padding:10px;
  display:flex;
  gap:10px;
}

nav button{
  background:none;
  border:none;
  color:#ccc;
  cursor:pointer;
}

nav button:hover{
  color:#fff;
}

/* MAIN */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  font-family:'Playfair Display';
  margin:10px 0;
}

.meta{
  font-size:12px;
  color:var(--muted);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:var(--paper);
  padding:20px;
  max-width:600px;
  max-height:80vh;
  overflow:auto;
}

.close{
  float:right;
  cursor:pointer;
}

/* BUTTON */
#topBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
  display:none;
  background:var(--accent);
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <div>SARTHAK News</div>
  <div>
    <span id="time"></span>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <h1>SARTHAK <span>News</span></h1>
  <p>Truth · Depth · Perspective</p>
</header>

<!-- NAV -->
<nav>
  <button onclick="loadNews('general')">Top</button>
  <button onclick="loadNews('technology')">Tech</button>
  <button onclick="loadNews('sports')">Sports</button>
  <button onclick="loadNews('business')">Business</button>
</nav>

<!-- MAIN -->
<div class="container">
  <div id="news" class="grid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalContent"></div>
  </div>
</div>

<!-- SCROLL BTN -->
<button id="topBtn" onclick="scrollTop()">↑</button>

<script>

/* TIME */
setInterval(()=>{
  document.getElementById("time").innerText=
  new Date().toLocaleTimeString();
},1000);

/* DARK MODE */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* LOAD NEWS (FAKE DATA SIMULATION) */
async function loadNews(category){

  document.getElementById("news").innerHTML="Loading...";

  let articles=[];

  for(let i=1;i<=6;i++){
    articles.push({
      title: category+" News Headline "+i,
      desc: "This is a short description of the news article.",
      img: `https://source.unsplash.com/400x300/?${category}`,
      author:"Reporter",
      time:"2h ago"
    });
  }

  renderNews(articles);
}

/* RENDER */
function renderNews(data){
  let html="";

  data.forEach(a=>{
    html+=`
    <div class="card" onclick="openModal('${a.title}','${a.desc}')">
      <img src="${a.img}">
      <h3>${a.title}</h3>
      <div class="meta">${a.author} · ${a.time}</div>
    </div>
    `;
  });

  document.getElementById("news").innerHTML=html;
}

/* MODAL */
function openModal(title,desc){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=
  `<h2>${title}</h2><p>${desc}</p>`;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* SCROLL BUTTON */
window.onscroll=()=>{
  document.getElementById("topBtn").style.display=
  window.scrollY>200?"block":"none";
};

function scrollTop(){
  window.scrollTo({top:0,behavior:'smooth'});
}

/* INIT */
loadNews("general");

</script>

</body>
</html>
