<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARTHAK News Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f5f0e8;
  --text:#111;
  --accent:#c0392b;
}

.dark{
  --bg:#111;
  --text:#f5f0e8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Source Sans 3';
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  border-bottom:2px solid var(--text);
}

h1{
  font-family:'Playfair Display';
}

span{color:var(--accent)}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#000;
}

nav button{
  background:none;
  color:#ccc;
  border:none;
  cursor:pointer;
}

/* SEARCH */
.search{
  text-align:center;
  margin:10px;
}

.search input{
  padding:8px;
  width:200px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:20px;
  max-width:600px;
}

/* BUTTONS */
.btn{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:6px;
  cursor:pointer;
  margin-top:5px;
}

</style>
</head>

<body>

<header>
  <h1>SARTHAK <span>News</span></h1>
</header>

<nav>
  <button onclick="loadNews('general')">Top</button>
  <button onclick="loadNews('technology')">Tech</button>
  <button onclick="loadNews('sports')">Sports</button>
  <button onclick="loadNews('business')">Business</button>
  <button onclick="toggleTheme()">🌙</button>
</nav>

<div class="search">
  <input id="search" placeholder="Search news">
  <button onclick="searchNews()">Search</button>
</div>

<div id="news" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <button onclick="closeModal()">X</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>

/* API KEY */
const API_KEY = "YOUR_API_KEY_HERE";

/* LOAD NEWS */
async function loadNews(category){
  let url = `https://newsapi.org/v2/top-headlines?country=in&category=${category}&apiKey=${API_KEY}`;
  let res = await fetch(url);
  let data = await res.json();
  renderNews(data.articles);
}

/* SEARCH */
async function searchNews(){
  let q = document.getElementById("search").value;
  let url = `https://newsapi.org/v2/everything?q=${q}&apiKey=${API_KEY}`;
  let res = await fetch(url);
  let data = await res.json();
  renderNews(data.articles);
}

/* RENDER */
function renderNews(articles){
  let html="";

  articles.forEach(a=>{
    if(!a.urlToImage) return;

    html+=`
    <div class="card">
      <img src="${a.urlToImage}">
      <h3>${a.title}</h3>
      <button class="btn" onclick="openModal('${a.title}','${a.description}','${a.url}')">Read</button>
      <button class="btn" onclick="saveBookmark('${a.title}','${a.url}')">⭐</button>
    </div>`;
  });

  document.getElementById("news").innerHTML=html;
}

/* MODAL */
function openModal(title,desc,url){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=
  `<h2>${title}</h2>
   <p>${desc || "No description available"}</p>
   <a href="${url}" target="_blank">Read Full Article</a>`;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* BOOKMARK */
function saveBookmark(title,url){
  let data = JSON.parse(localStorage.getItem("bookmarks")||"[]");
  data.push({title,url});
  localStorage.setItem("bookmarks",JSON.stringify(data));
  alert("Saved!");
}

/* DARK MODE */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* INIT */
loadNews("general");

</script>

</body>
</html>
